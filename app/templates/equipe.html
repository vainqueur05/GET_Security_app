{% extends 'base.html' %}

{% block title %}Équipe - {{ config.nom_entreprise }}{% endblock %}

{% block content %}
<div class="container py-5">
    <h1 class="section-title">Notre équipe</h1>
    <div class="row g-4">
        {% for membre in equipe %}
        <div class="col-md-3 fade-in">
            <div class="team-member">
                <img src="{{ url_for('static', filename='images/' + membre.photo) if membre.photo else url_for('static', filename='images/default-avatar.jpg') }}" alt="{{ membre.nom }}">
                <h5>{{ membre.nom }}</h5>
                <p>{{ membre.role }}</p>
                <p class="small">{{ membre.description }}</p>
            </div>
        </div>
        {% else %}
        <p class="text-center">Aucun membre pour le moment.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
