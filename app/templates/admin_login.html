<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accès Système | KAIROS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --kairos-gold: #D4AF37;
            --kairos-black: #050505;
            --kairos-dark-grey: #111111;
        }

        body { 
            background: var(--kairos-black); 
            color: #fff;
            display: flex; 
            align-items: center; 
            justify-content: center;
            height: 100vh; 
            margin: 0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* Arrière-plan animé discret */
        .bg-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(212, 175, 55, 0.03) 0%, transparent 70%);
            z-index: -1;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-form { 
            background: var(--kairos-dark-grey); 
            padding: 3rem 2.5rem; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        /* Ligne dorée décorative */
        .login-form::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(to right, transparent, var(--kairos-gold), transparent);
        }

        .brand-logo {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .brand-logo h2 {
            font-family: 'Space Grotesk', sans-serif;
            text-transform: uppercase;
            letter-spacing: 6px;
            font-weight: 700;
            font-size: 1.5rem;
            color: #fff;
            margin: 0;
        }

        .brand-logo span {
            font-size: 0.65rem;
            color: var(--kairos-gold);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .form-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #666;
            margin-bottom: 10px;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0;
            color: #fff;
            padding: 12px 15px;
            transition: 0.3s;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.04);
            border-color: var(--kairos-gold);
            box-shadow: none;
            color: #fff;
        }

        .btn-access {
            background: transparent;
            color: var(--kairos-gold);
            border: 1px solid var(--kairos-gold);
            border-radius: 0;
            padding: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.8rem;
            margin-top: 1rem;
            transition: 0.4s;
        }

        .btn-access:hover {
            background: var(--kairos-gold);
            color: #000;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .alert {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid #dc3545;
            color: #dc3545;
            border-radius: 0;
            font-size: 0.8rem;
            text-align: center;
        }

        .footer-link {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .footer-link a {
            color: #444;
            text-decoration: none;
            transition: 0.3s;
        }

        .footer-link a:hover {
            color: var(--kairos-gold);
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <div class="login-container">
        <div class="brand-logo">
            <h2>KAIROS</h2>
            <span>Core Ecosystem</span>
        </div>

        <div class="login-form shadow-2xl">
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for msg in messages %}
                        <div class="alert mb-4">{{ msg }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="post" action="{{ url_for('main.admin_login') }}">
                <div class="mb-4">
                    <label for="password" class="form-label">Clé d'authentification</label>
                    <div class="input-group">
                        <input type="password" class="form-control text-center" id="password" name="password" placeholder="••••••••" required autofocus>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-access w-100">
                    <i class="bi bi-shield-lock me-2"></i> Déverrouiller
                </button>
            </form>
        </div>

        <div class="footer-link">
            <a href="{{ url_for('main.index') }}"><i class="bi bi-arrow-left me-1"></i> Retour au portail public</a>
        </div>
    </div>
</body>
</html>
